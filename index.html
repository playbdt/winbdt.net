<!DOCTYPE html>

<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>সিকিউরিটি স্ক্যান</title>

<style>
body{
    margin:0;
    padding:15px;
    background:#000;
    color:#00ff41;
    font-family:Consolas, monospace;
    overflow:hidden;
}

#header{
    color:#ff3333;
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

#terminal{
    height:60vh;
    overflow:hidden;
    white-space:pre-line;
    line-height:1.5;
}

.progress-box{
    margin-top:15px;
}

.progress{
    width:100%;
    height:25px;
    border:1px solid #00ff41;
}

.bar{
    width:0%;
    height:100%;
    background:#00ff41;
    transition:0.3s;
}

#percent{
    margin-top:8px;
}

#countdown{
    color:#ff4444;
    font-size:28px;
    font-weight:bold;
    margin-top:20px;
    text-align:center;
}
</style>

</head>
<body>

<div id="header">⚠ হ্যাকিং চলছে...</div>

<div id="terminal"></div>

<div class="progress-box">
    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>
    <div id="percent">0%</div>
</div>

<div id="countdown"></div>

<script>

const terminal = document.getElementById("terminal");
const bar = document.getElementById("bar");
const percent = document.getElementById("percent");
const countdown = document.getElementById("countdown");

const logs = [
"ডিভাইস শনাক্ত Oppo A5...",
"সিস্টেম তথ্য সংগ্রহ করা হচ্ছে...",
"অ্যাপ্লিকেশন তালিকা বিশ্লেষণ করা হচ্ছে...",
"মিডিয়া ফাইল পরীক্ষা করা হচ্ছে...",
"ক্যাশ ডেটা স্ক্যান করা হচ্ছে...",
"নেটওয়ার্ক কনফিগারেশন যাচাই করা হচ্ছে...",
"সংরক্ষিত ডেটা বিশ্লেষণ করা হচ্ছে...",
"এনক্রিপশন অবস্থা পরীক্ষা করা হচ্ছে...",
"সিস্টেম লগ সংগ্রহ করা হচ্ছে...",
"প্রক্রিয়া সম্পন্নের প্রস্তুতি..."
];

let line = 0;

function addLog(){
    if(line < logs.length){
        terminal.innerHTML += logs[line] + "\\n";
        terminal.scrollTop = terminal.scrollHeight;
        line++;
        setTimeout(addLog, 1200);
    }
}

addLog();

let p = 0;

const progress = setInterval(() => {

    p += Math.floor(Math.random()*5)+1;

    if(p > 100) p = 100;

    bar.style.width = p + "%";
    percent.innerText = p + "% সম্পন্ন";

    if(navigator.vibrate && (p % 15 === 0)){
        navigator.vibrate(150);
    }

    if(p === 100){

        clearInterval(progress);

        let sec = 10;

        countdown.innerHTML =
        "চূড়ান্ত বিশ্লেষণ: " + sec;

        const timer = setInterval(() => {

            sec--;

            countdown.innerHTML =
            "চূড়ান্ত বিশ্লেষণ: " + sec;

            if(navigator.vibrate){
                navigator.vibrate(200);
            }

            if(sec <= 0){

                clearInterval(timer);

                document.body.innerHTML =
                '<div style="color:#ff3333;text-align:center;padding-top:25vh;font-size:32px;font-weight:bold;">' +
                'বিশ্লেষণ সম্পন্ন' +
                '</div>';
            }

        },1000);
    }

},300);

</script>

</body>
</html>
