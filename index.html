<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>সিকিউরিটি স্ক্যান সিমুলেশন</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    min-height:100vh;
    padding:20px;
    font-family:Segoe UI,sans-serif;
    background:linear-gradient(135deg,#0f172a,#111827,#020617);
    color:#00ff88;
    overflow:hidden;
}

.scan-line{
    position:fixed;
    top:-100%;
    left:0;
    width:100%;
    height:120px;
    background:linear-gradient(to bottom,
    transparent,
    rgba(0,255,136,.15),
    transparent);
    animation:scan 4s linear infinite;
    pointer-events:none;
}

@keyframes scan{
    from{top:-120px}
    to{top:100%}
}

.container{
    max-width:850px;
    margin:auto;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 40px rgba(0,255,136,.1);
}

#header{
    text-align:center;
    color:#ff6464;
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
    text-shadow:0 0 15px rgba(255,100,100,.4);
}

.badge{
    text-align:center;
    color:#fff;
    margin-bottom:15px;
    font-size:14px;
}

#terminal{
    height:50vh;
    overflow-y:auto;
    background:rgba(0,0,0,.3);
    border-radius:15px;
    padding:15px;
    line-height:1.8;
    border:1px solid rgba(255,255,255,.08);
}

.progress-box{
    margin-top:20px;
}

.progress{
    height:24px;
    background:rgba(255,255,255,.08);
    border-radius:20px;
    overflow:hidden;
}

.bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#00ff88,#00d4ff);
    transition:.3s;
}

#percent{
    text-align:center;
    margin-top:10px;
    color:#fff;
    font-weight:bold;
}

#countdown{
    margin-top:20px;
    text-align:center;
    font-size:30px;
    color:#ffd54a;
    font-weight:bold;
}

.flash{
    animation:flash .15s;
}

@keyframes flash{
    0%{filter:brightness(1.5)}
    100%{filter:brightness(1)}
}

.success{
    text-align:center;
    padding-top:25vh;
}

.success h1{
    color:#00ff99;
    font-size:42px;
}

.success p{
    color:white;
    margin-top:10px;
}

@media(max-width:600px){
    #header{font-size:22px}
    #countdown{font-size:24px}
}
</style>
</head>
<body>

<div class="scan-line"></div>

<div class="container">

<div id="header"> 👩🏻‍💻 হ্যাকিং চলছে</div>

<div class="badge">🔎 স্ক্যান প্রক্রিয়া চলমান</div>

<div id="terminal"></div>

<div class="progress-box">
    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>
    <div id="percent">0%</div>
</div>

<div id="countdown"></div>

</div>

<script>

const terminal=document.getElementById("terminal");
const bar=document.getElementById("bar");
const percent=document.getElementById("percent");
const countdown=document.getElementById("countdown");

const logs=[
"ডিভাইস শনাক্ত OPPO A5",
"সিস্টেম তথ্য সংগ্রহ করা হচ্ছে...",
"অ্যাপ্লিকেশন তালিকা বিশ্লেষণ করা হচ্ছে...",
"মিডিয়া ফাইল পরীক্ষা করা হচ্ছে...",
"ক্যাশ ডেটা স্ক্যান করা হচ্ছে...",
"নেটওয়ার্ক কনফিগারেশন যাচাই করা হচ্ছে...",
"সংরক্ষিত ডেটা বিশ্লেষণ করা হচ্ছে...",
"এনক্রিপশন অবস্থা পরীক্ষা করা হচ্ছে...",
"সিস্টেম লগ সংগ্রহ করা হচ্ছে...",
"প্রক্রিয়া সম্পন্নের প্রস্তুতি..."
];

function beep(){
 try{
   const ctx=new(window.AudioContext||window.webkitAudioContext)();
   const osc=ctx.createOscillator();
   const gain=ctx.createGain();
   osc.connect(gain);
   gain.connect(ctx.destination);
   osc.frequency.value=700;
   gain.gain.value=0.03;
   osc.start();
   osc.stop(ctx.currentTime+0.1);
 }catch(e){}
}

if(navigator.vibrate){
 navigator.vibrate([200,100,200]);
}

let line=0;

function addLog(){
 if(line<logs.length){

   const colors = [
"#00ff88",
"#00d4ff",
"#ffd54a",
"#ff6b6b",
"#b388ff",
"#40c4ff",
"#ff4081",
"#69f0ae",
"#ffab40",
"#64ffda"
];

const div = document.createElement("div");

div.textContent = "▶ " + logs[line];

const color = colors[line % colors.length];

div.style.color = color;
div.style.fontWeight = "600";
div.style.textShadow = "0 0 10px " + color;

div.style.opacity = "0";
div.style.transform = "translateX(-15px)";
div.style.transition = "all .5s ease";

terminal.appendChild(div);

setTimeout(() => {
    div.style.opacity = "1";
    div.style.transform = "translateX(0)";
}, 50);

let glow = 0;

const rainbow = setInterval(() => {

    glow++;

    div.style.filter =
    `hue-rotate(${glow * 10}deg)`;

    if(glow > 36){
        clearInterval(rainbow);
        div.style.filter = "none";
    }

}, 50); 

   terminal.scrollTop=terminal.scrollHeight;

   if(line%2===0){
      document.body.classList.add("flash");
      setTimeout(()=>{
        document.body.classList.remove("flash");
      },150);
   }

   line++;
   setTimeout(addLog,1200);
 }
}

addLog();

setInterval(()=>{
 document.title="সিকিউরিটি স্ক্যান সিমুলেশন";
},1000);

let p=0;

const progress=setInterval(()=>{

 p+=Math.floor(Math.random()*5)+1;

 if(p>100)p=100;

 bar.style.width=p+"%";
 percent.innerText=p+"% সম্পন্ন";

 if(p%20===0){
   beep();
 }

 if(navigator.vibrate && p%15===0){
   navigator.vibrate(120);
 }

 if(p===100){

   clearInterval(progress);

   if(navigator.vibrate){
      navigator.vibrate([300,100,300,100,500]);
   }

   let sec=10;

   countdown.innerHTML=
   "চূড়ান্ত বিশ্লেষণ: "+sec;

   const timer=setInterval(()=>{

      sec--;

      countdown.innerHTML=
      "চূড়ান্ত বিশ্লেষণ: "+sec;

      if(sec<=0){

        clearInterval(timer);

        document.body.innerHTML=
        `<div class="success">
            <h1>✅ বিশ্লেষণ সম্পন্ন</h1>
            <p>সিকিউরিটি স্ক্যান সফলভাবে সম্পন্ন হয়েছে</p>
         </div>`;
      }

   },1000);

 }

},300);

</script>

</body>
</html>
```
